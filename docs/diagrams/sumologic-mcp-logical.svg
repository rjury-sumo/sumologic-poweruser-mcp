<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="900" height="520" fill="#0f1117" rx="12"/>

  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">Sumo Logic MCP — Logical Integration</text>
  <text x="450" y="57" text-anchor="middle" font-size="11" fill="#64748b">How the MCP server connects local AI clients to remote Sumo Logic APIs</text>

  <!-- ─── LOCAL MACHINE boundary ─── -->
  <rect x="30" y="76" width="500" height="390" rx="10" fill="none" stroke="#334155" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="50" y="96" font-size="10" font-weight="700" fill="#475569" letter-spacing="1.2">LOCAL MACHINE</text>

  <!-- ─── Config File ─── -->
  <rect x="60" y="108" width="200" height="120" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="160" y="128" text-anchor="middle" font-size="11" font-weight="700" fill="#94a3b8">⚙️  Config File</text>
  <text x="160" y="142" text-anchor="middle" font-size="9" fill="#64748b">~/.sumologic-mcp / env vars</text>
  <rect x="75" y="150" width="170" height="70" rx="5" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="85" y="165" font-size="9" fill="#34d399" font-family="monospace">{</text>
  <text x="92" y="179" font-size="9" fill="#94a3b8" font-family="monospace">"accessId":  <tspan fill="#fbbf24">"XXXX"</tspan>,</text>
  <text x="92" y="193" font-size="9" fill="#94a3b8" font-family="monospace">"accessKey": <tspan fill="#fbbf24">"YYYY"</tspan>,</text>
  <text x="92" y="207" font-size="9" fill="#94a3b8" font-family="monospace">"endpoint":  <tspan fill="#38bdf8">"api.us2…"</tspan></text>
  <text x="85" y="218" font-size="9" fill="#34d399" font-family="monospace">}</text>

  <!-- per-instance note -->
  <text x="160" y="240" text-anchor="middle" font-size="9" fill="#64748b">One config block per instance</text>
  <text x="160" y="252" text-anchor="middle" font-size="9" fill="#64748b">(default · staging · demo)</text>

  <!-- config → MCP arrow -->
  <line x1="260" y1="168" x2="310" y2="168" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="307,164 315,168 307,172" fill="#475569"/>
  <text x="285" y="160" text-anchor="middle" font-size="8" fill="#64748b">loads</text>

  <!-- ─── MCP Server ─── -->
  <rect x="310" y="108" width="190" height="250" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <rect x="310" y="108" width="190" height="28" rx="8" fill="#3b82f6" fill-opacity="0.4"/>
  <text x="405" y="126" text-anchor="middle" font-size="12" font-weight="700" fill="#93c5fd">MCP Server</text>
  <text x="405" y="140" text-anchor="middle" font-size="9" fill="#60a5fa">sumologic-mcp</text>

  <text x="325" y="162" font-size="9" font-weight="600" fill="#7dd3fc">Capabilities</text>
  <text x="325" y="177" font-size="9" fill="#bfdbfe">· 50+ tool definitions</text>
  <text x="325" y="191" font-size="9" fill="#bfdbfe">· JSON-RPC 2.0 handler</text>
  <text x="325" y="205" font-size="9" fill="#bfdbfe">· Instance router</text>
  <text x="325" y="219" font-size="9" fill="#bfdbfe">· Auth injection (per call)</text>
  <text x="325" y="233" font-size="9" fill="#bfdbfe">· Result formatting</text>
  <text x="325" y="247" font-size="9" fill="#bfdbfe">· Async job polling</text>
  <text x="325" y="261" font-size="9" fill="#bfdbfe">· Pagination handling</text>

  <line x1="325" y1="272" x2="490" y2="272" stroke="#1e3a8a" stroke-width="1"/>

  <text x="325" y="288" font-size="9" font-weight="600" fill="#7dd3fc">Tool groups</text>
  <text x="325" y="303" font-size="9" fill="#bfdbfe">Search · Cost · Audit</text>
  <text x="325" y="317" font-size="9" fill="#bfdbfe">Content · Admin · Skills</text>
  <text x="325" y="331" font-size="9" fill="#bfdbfe">Metrics · Monitors</text>
  <text x="325" y="345" font-size="9" fill="#bfdbfe">Volume · Forecast</text>

  <!-- ─── AI Clients ─── -->
  <rect x="60" y="300" width="200" height="150" rx="8" fill="#1a1d2e" stroke="#6366f1" stroke-width="1.5"/>
  <rect x="60" y="300" width="200" height="26" rx="8" fill="#6366f1" fill-opacity="0.3"/>
  <text x="160" y="317" text-anchor="middle" font-size="11" font-weight="700" fill="#a5b4fc">AI Clients</text>

  <!-- Client items -->
  <rect x="75" y="333" width="170" height="28" rx="5" fill="#312e81" fill-opacity="0.4" stroke="#4338ca" stroke-width="1"/>
  <text x="160" y="344" text-anchor="middle" font-size="10" font-weight="600" fill="#c7d2fe">💻  Claude Desktop (Cowork)</text>
  <text x="160" y="356" text-anchor="middle" font-size="8" fill="#a5b4fc">cowork mode · skills · plugins</text>

  <rect x="75" y="367" width="170" height="28" rx="5" fill="#1e1b4b" fill-opacity="0.4" stroke="#3730a3" stroke-width="1"/>
  <text x="160" y="378" text-anchor="middle" font-size="10" font-weight="600" fill="#c7d2fe">🖥️  Claude Code (CLI)</text>
  <text x="160" y="390" text-anchor="middle" font-size="8" fill="#a5b4fc">terminal · agentic coding</text>

  <rect x="75" y="401" width="170" height="28" rx="5" fill="#1e1b4b" fill-opacity="0.4" stroke="#4338ca" stroke-width="1"/>
  <text x="160" y="412" text-anchor="middle" font-size="10" font-weight="600" fill="#c7d2fe">🔌  Any MCP Client</text>
  <text x="160" y="424" text-anchor="middle" font-size="8" fill="#a5b4fc">IDE, custom app, API</text>

  <!-- clients → MCP arrow (bidirectional) -->
  <line x1="260" y1="375" x2="310" y2="300" stroke="#6366f1" stroke-width="2"/>
  <polygon points="306,303 314,296 310,306" fill="#6366f1"/>
  <polygon points="256,372 264,379 260,368" fill="#6366f1"/>
  <text x="280" y="352" text-anchor="middle" font-size="8" fill="#818cf8" transform="rotate(-38,280,352)">MCP protocol</text>
  <text x="288" y="363" text-anchor="middle" font-size="8" fill="#818cf8" transform="rotate(-38,288,363)">JSON-RPC 2.0</text>

  <!-- ─── INTERNET boundary ─── -->
  <rect x="570" y="76" width="300" height="390" rx="10" fill="none" stroke="#0e4d3a" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="590" y="96" font-size="10" font-weight="700" fill="#065f46" letter-spacing="1.2">SUMO LOGIC CLOUD</text>

  <!-- Sumo API box -->
  <rect x="600" y="108" width="240" height="200" rx="8" fill="#0c1f0c" stroke="#16a34a" stroke-width="2"/>
  <rect x="600" y="108" width="240" height="28" rx="8" fill="#16a34a" fill-opacity="0.35"/>
  <text x="720" y="126" text-anchor="middle" font-size="12" font-weight="700" fill="#4ade80">Sumo Logic REST APIs</text>
  <text x="720" y="140" text-anchor="middle" font-size="9" fill="#86efac">api.{region}.sumologic.com</text>

  <text x="615" y="162" font-size="9" font-weight="600" fill="#4ade80">Endpoints called</text>
  <text x="615" y="177" font-size="9" fill="#bbf7d0">/api/v1/search/jobs</text>
  <text x="615" y="191" font-size="9" fill="#bbf7d0">/api/v1/dashboards</text>
  <text x="615" y="205" font-size="9" fill="#bbf7d0">/api/v1/collectors</text>
  <text x="615" y="219" font-size="9" fill="#bbf7d0">/api/v1/partitions</text>
  <text x="615" y="233" font-size="9" fill="#bbf7d0">/api/v1/accounts/usage</text>
  <text x="615" y="247" font-size="9" fill="#bbf7d0">/api/v1/content/…</text>
  <text x="615" y="261" font-size="9" fill="#bbf7d0">/api/v1/monitors/…</text>
  <text x="615" y="275" font-size="9" fill="#bbf7d0">/api/v1/metrics/…</text>
  <text x="615" y="289" font-size="9" fill="#bbf7d0">/api/v1/users · /roles</text>
  <text x="615" y="303" font-size="9" fill="#86efac">Auth: Basic (accessId:accessKey)</text>

  <!-- Multi-instance box -->
  <rect x="600" y="325" width="240" height="120" rx="8" fill="#0c1a2e" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="720" y="345" text-anchor="middle" font-size="11" font-weight="700" fill="#38bdf8">Instances</text>

  <rect x="615" y="353" width="64" height="40" rx="5" fill="#0284c7" fill-opacity="0.2" stroke="#0284c7" stroke-width="1"/>
  <text x="647" y="369" text-anchor="middle" font-size="10" font-weight="600" fill="#7dd3fc">default</text>
  <text x="647" y="382" text-anchor="middle" font-size="8" fill="#38bdf8">us2.sumo…</text>

  <rect x="688" y="353" width="64" height="40" rx="5" fill="#075985" fill-opacity="0.2" stroke="#0369a1" stroke-width="1"/>
  <text x="720" y="369" text-anchor="middle" font-size="10" font-weight="600" fill="#bae6fd">staging</text>
  <text x="720" y="382" text-anchor="middle" font-size="8" fill="#38bdf8">us5.sumo…</text>

  <rect x="761" y="353" width="64" height="40" rx="5" fill="#082f49" fill-opacity="0.3" stroke="#075985" stroke-width="1"/>
  <text x="793" y="369" text-anchor="middle" font-size="10" font-weight="600" fill="#e0f2fe">demo</text>
  <text x="793" y="382" text-anchor="middle" font-size="8" fill="#38bdf8">au.sumo…</text>

  <text x="720" y="408" text-anchor="middle" font-size="8" fill="#64748b">Each with own accessId / accessKey / endpoint</text>
  <text x="720" y="420" text-anchor="middle" font-size="8" fill="#64748b">Resolved from config at call time</text>
  <text x="720" y="432" text-anchor="middle" font-size="8" fill="#64748b">instance: "staging" param selects config block</text>

  <!-- ─── MCP → Sumo API arrow ─── -->
  <line x1="500" y1="220" x2="598" y2="220" stroke="#22c55e" stroke-width="2"/>
  <polygon points="595,216 603,220 595,224" fill="#22c55e"/>
  <!-- return arrow -->
  <line x1="598" y1="235" x2="500" y2="235" stroke="#22c55e" stroke-width="2"/>
  <polygon points="503,231 495,235 503,239" fill="#22c55e"/>

  <!-- HTTPS label -->
  <rect x="510" y="209" width="80" height="37" rx="4" fill="#14532d" fill-opacity="0.5"/>
  <text x="550" y="223" text-anchor="middle" font-size="9" font-weight="700" fill="#4ade80">HTTPS</text>
  <text x="550" y="235" text-anchor="middle" font-size="8" fill="#86efac">Basic Auth</text>
  <text x="550" y="245" text-anchor="middle" font-size="8" fill="#86efac">JSON REST</text>

  <!-- ─── Footer note ─── -->
  <rect x="30" y="480" width="840" height="28" rx="6" fill="#111827" stroke="#1f2937" stroke-width="1"/>
  <text x="450" y="493" text-anchor="middle" font-size="9" fill="#64748b">The MCP server runs locally alongside the AI client · All credentials stay on the local machine · No data is proxied through Anthropic</text>
  <text x="450" y="505" text-anchor="middle" font-size="9" fill="#475569">Tool calls: mcp__sumologic__&lt;tool&gt;(instance="staging", …)  →  routes to matching config block  →  calls Sumo Logic REST API directly</text>
</svg>
