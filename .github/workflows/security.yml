name: Security Scan

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Install dependencies
      run: |
        uv sync --all-extras

    - name: Run Bandit
      run: |
        uv run bandit -r src/ -f json -o bandit-report.json
        uv run bandit -r src/ -f screen

    - name: Run pip-audit
      run: |
        uv tool install pip-audit
        uv tool run pip-audit --desc

    - name: Run Safety check
      run: |
        uv tool install safety
        uv tool run safety check --json || true
      continue-on-error: true

    - name: Upload security reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-reports
        path: |
          bandit-report.json

    - name: Create Issue on Security Finding
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: '🔒 Security Scan Failed',
            body: 'Security scan detected potential vulnerabilities. Please review the workflow run for details.',
            labels: ['security', 'automated']
          })
